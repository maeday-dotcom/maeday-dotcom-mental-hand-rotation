<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mental Hand Rotation</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f6fa;
  text-align: center;
}

table {
  border-collapse: collapse;
  margin: 10px auto;
}

th {
  background: #4b74c0;
  color: white;
  padding: 10px;
}

td {
  background: #c7cde0;
  padding: 10px;
}

.summary-table td:first-child,
.summary-table th:first-child {
  background: #4b74c0;
  color: white;
}
</style>
</head>

<body>

<h2>結果</h2>

<table class="summary-table">
<thead>
<tr>
<th id="summarySetName">Normal</th>
<th>右0°</th>
<th>右90°</th>
<th>右180°</th>
<th>右270°</th>
<th>左0°</th>
<th>左90°</th>
<th>左180°</th>
<th>左270°</th>
<th>右平均</th>
<th>左平均</th>
</tr>
</thead>

<tbody>
<tr>
<td>正答率 [%]</td>
<td id="acc-r-0">-</td>
<td id="acc-r-90">-</td>
<td id="acc-r-180">-</td>
<td id="acc-r-270">-</td>
<td id="acc-l-0">-</td>
<td id="acc-l-90">-</td>
<td id="acc-l-180">-</td>
<td id="acc-l-270">-</td>
<td id="acc-r-mean">-</td>
<td id="acc-l-mean">-</td>
</tr>
</tbody>
</table>

<table class="summary-table">
<thead>
<tr>
<th></th>
<th>右0°</th>
<th>右90°</th>
<th>右180°</th>
<th>右270°</th>
<th>左0°</th>
<th>左90°</th>
<th>左180°</th>
<th>左270°</th>
<th>右平均</th>
<th>左平均</th>
</tr>
</thead>

<tbody>
<tr>
<td>反応時間 [msec]</td>
<td id="rt-r-0">-</td>
<td id="rt-r-90">-</td>
<td id="rt-r-180">-</td>
<td id="rt-r-270">-</td>
<td id="rt-l-0">-</td>
<td id="rt-l-90">-</td>
<td id="rt-l-180">-</td>
<td id="rt-l-270">-</td>
<td id="rt-r-mean">-</td>
<td id="rt-l-mean">-</td>
</tr>
</tbody>
</table>

<script>
function mean(arr){
  if(arr.length===0) return null;
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}

function fill(id,val){
  document.getElementById(id).textContent =
    val==null? "-" : Math.round(val);
}

/* ==== ここに既存の結果データ（testResults）を使う ==== */
/* 例としてダミー */
const testResults = [
  {condition:"R_P_0",correct:1,rtMs:500},
  {condition:"R_D_0",correct:0,rtMs:700},
];

/* ==== 集計 ==== */
const map = {
"r-0":["R_P_0","R_D_0"],
"r-90":["R_P_90","R_D_90"],
"r-180":["R_P_180","R_D_180"],
"r-270":["R_P_270","R_D_270"],
"l-0":["L_P_0","L_D_0"],
"l-90":["L_P_90","L_D_90"],
"l-180":["L_P_180","L_D_180"],
"l-270":["L_P_270","L_D_270"]
};

const summary = {};

for(const key in map){
  const rows = testResults.filter(r=>map[key].includes(r.condition));
  summary[key]={
    acc: rows.length? mean(rows.map(r=>r.correct))*100 : null,
    rt: rows.length? mean(rows.map(r=>r.rtMs)) : null
  };
}

/* ==== 表へ反映 ==== */
const rKeys=["r-0","r-90","r-180","r-270"];
const lKeys=["l-0","l-90","l-180","l-270"];

rKeys.forEach(k=>fill("acc-"+k,summary[k].acc));
lKeys.forEach(k=>fill("acc-"+k,summary[k].acc));
rKeys.forEach(k=>fill("rt-"+k,summary[k].rt));
lKeys.forEach(k=>fill("rt-"+k,summary[k].rt));

fill("acc-r-mean", mean(rKeys.map(k=>summary[k].acc).filter(v=>v!=null)));
fill("acc-l-mean", mean(lKeys.map(k=>summary[k].acc).filter(v=>v!=null)));

fill("rt-r-mean", mean(rKeys.map(k=>summary[k].rt).filter(v=>v!=null)));
fill("rt-l-mean", mean(lKeys.map(k=>summary[k].rt).filter(v=>v!=null)));

</script>

</body>
</html>
